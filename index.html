<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Support</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── CSS Variables ───────────────────────────────────────── */
      :root {
        --bg: #0b0f1a;
        --surface: #111827;
        --panel: #1a2235;
        --border: #1e2d45;
        --accent: #3b82f6;
        --accent2: #06b6d4;
        --text: #e2e8f0;
        --muted: #64748b;
        --user-bg: #1d3a6e;
        --bot-bg: #1a2235;
        --radius: 14px;
        --font-main: "Sora", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }

      /* ── Reset ───────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        /* subtle grid pattern background */
        background-image:
          linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ── Chat Container ──────────────────────────────────────── */
      .chat-container {
        width: 100%;
        max-width: 780px;
        height: 92vh;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow:
          0 0 60px rgba(59, 130, 246, 0.08),
          0 30px 60px rgba(0, 0, 0, 0.4);
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Header ──────────────────────────────────────────────── */
      .chat-header {
        padding: 20px 28px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }

      .avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
        box-shadow: 0 0 16px rgba(59, 130, 246, 0.35);
      }

      .header-info h1 {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 2px;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(34, 197, 94, 0);
        }
      }

      .header-actions {
        margin-left: auto;
        display: flex;
        gap: 10px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 15px;
      }

      .icon-btn:hover {
        background: var(--border);
        color: var(--text);
      }

      /* ── Messages Area ───────────────────────────────────────── */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 28px 28px 12px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        scroll-behavior: smooth;
      }

      /* custom scrollbar */
      .messages::-webkit-scrollbar {
        width: 4px;
      }
      .messages::-webkit-scrollbar-track {
        background: transparent;
      }
      .messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      /* ── Message Bubbles ─────────────────────────────────────── */
      .message {
        display: flex;
        gap: 12px;
        max-width: 85%;
        animation: msgIn 0.3s ease both;
      }

      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }
      .message.bot {
        align-self: flex-start;
      }

      .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .message.bot .msg-avatar {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
      }
      .message.user .msg-avatar {
        background: var(--user-bg);
        border: 1px solid rgba(59, 130, 246, 0.3);
      }

      .bubble {
        padding: 13px 17px;
        border-radius: var(--radius);
        font-size: 0.9rem;
        line-height: 1.65;
        word-break: break-word;
      }

      .message.bot .bubble {
        background: var(--bot-bg);
        border: 1px solid var(--border);
        border-top-left-radius: 4px;
      }

      .message.user .bubble {
        background: var(--user-bg);
        border: 1px solid rgba(59, 130, 246, 0.25);
        border-top-right-radius: 4px;
        color: #bfdbfe;
      }

      .msg-time {
        font-size: 0.68rem;
        color: var(--muted);
        margin-top: 5px;
        font-family: var(--font-mono);
      }

      .message.user .msg-time {
        text-align: right;
      }

      /* ── Typing Indicator ────────────────────────────────────── */
      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 13px 17px;
        background: var(--bot-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        border-top-left-radius: 4px;
        width: fit-content;
      }

      .typing-indicator span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: bounce 1.2s infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      /* ── Suggestions ─────────────────────────────────────────── */
      .suggestions {
        padding: 0 28px 14px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .suggestion-btn {
        padding: 7px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.78rem;
        font-family: var(--font-main);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .suggestion-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(59, 130, 246, 0.08);
      }

      /* ── Input Area ──────────────────────────────────────────── */
      .input-area {
        padding: 16px 20px 20px;
        border-top: 1px solid var(--border);
        background: var(--panel);
        flex-shrink: 0;
      }

      .input-wrapper {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px 10px 10px 18px;
        transition: border-color 0.2s;
      }

      .input-wrapper:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      #userInput {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-main);
        font-size: 0.9rem;
        line-height: 1.5;
        resize: none;
        max-height: 120px;
        min-height: 24px;
      }

      #userInput::placeholder {
        color: var(--muted);
      }

      .send-btn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
        font-size: 16px;
      }

      .send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 16px rgba(59, 130, 246, 0.4);
      }
      .send-btn:active {
        transform: scale(0.97);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .input-hint {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 8px;
        text-align: center;
        font-family: var(--font-mono);
      }

      /* ── Welcome Message ─────────────────────────────────────── */
      .welcome {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
      }

      .welcome .welcome-icon {
        font-size: 3rem;
        margin-bottom: 14px;
        display: block;
      }

      .welcome h2 {
        font-size: 1.1rem;
        color: var(--text);
        margin-bottom: 8px;
      }
      .welcome p {
        font-size: 0.85rem;
        line-height: 1.6;
      }

      /* ── Error Bubble ────────────────────────────────────────── */
      .error-bubble {
        background: rgba(239, 68, 68, 0.1) !important;
        border-color: rgba(239, 68, 68, 0.3) !important;
        color: #fca5a5 !important;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <!-- ── Header ── -->
      <div class="chat-header">
        <div class="avatar">🎧</div>
        <div class="header-info">
          <h1>Customer Support</h1>
          <div class="status">
            <div class="status-dot"></div>
            <span>Online · Powered by AI</span>
          </div>
        </div>
        <div class="header-actions">
          <!-- Clear chat button -->
          <button class="icon-btn" onclick="clearChat()" title="Clear chat">
            🗑️
          </button>
        </div>
      </div>

      <!-- ── Messages ── -->
      <div class="messages" id="messages">
        <!-- Welcome screen shown before first message -->
        <div class="welcome" id="welcome">
          <span class="welcome-icon">💬</span>
          <h2>How can we help you today?</h2>
          <p>
            Ask anything about your orders, returns,<br />shipping, or account —
            we're here 24/7.
          </p>
        </div>
      </div>

      <!-- ── Quick Suggestion Chips ── -->
      <div class="suggestions" id="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Track my order
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Return a product
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Shipping info
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Cancel order
        </button>
      </div>

      <!-- ── Input Area ── -->
      <div class="input-area">
        <div class="input-wrapper">
          <!-- Auto-resizing textarea -->
          <textarea
            id="userInput"
            placeholder="Type your message…"
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button
            class="send-btn"
            id="sendBtn"
            onclick="sendMessage()"
            title="Send"
          >
            ➤
          </button>
        </div>
        <div class="input-hint">
          Press Enter to send · Shift+Enter for new line
        </div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────
      let isWaiting = false; // prevent sending while bot is responding

      // ── Helpers ───────────────────────────────────────────────────

      // Returns current time as HH:MM
      function getTime() {
        return new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      // Scrolls the message list to the bottom
      function scrollToBottom() {
        const box = document.getElementById("messages");
        box.scrollTop = box.scrollHeight;
      }

      // Hides the welcome screen on first message
      function hideWelcome() {
        const w = document.getElementById("welcome");
        if (w) w.remove();
        document.getElementById("suggestions").style.display = "none";
      }

      // Auto-resize textarea as user types
      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
      }

      // ── Append a message bubble to the chat ───────────────────────
      // role: 'user' or 'bot'
      // text: message content
      // isError: style as error (red) if true
      function appendMessage(role, text, isError = false) {
        hideWelcome();

        const container = document.getElementById("messages");

        // Outer wrapper
        const msg = document.createElement("div");
        msg.className = `message ${role}`;

        // Avatar emoji
        const av = document.createElement("div");
        av.className = "msg-avatar";
        av.textContent = role === "bot" ? "🎧" : "👤";

        // Right side: bubble + timestamp
        const inner = document.createElement("div");

        const bubble = document.createElement("div");
        bubble.className = "bubble" + (isError ? " error-bubble" : "");
        bubble.textContent = text;

        const time = document.createElement("div");
        time.className = "msg-time";
        time.textContent = getTime();

        inner.appendChild(bubble);
        inner.appendChild(time);

        msg.appendChild(av);
        msg.appendChild(inner);
        container.appendChild(msg);

        scrollToBottom();
        return bubble; // return bubble so we can update it (typing indicator)
      }

      // ── Show animated typing indicator ────────────────────────────
      // Returns the wrapper element so we can remove it later
      function showTyping() {
        const container = document.getElementById("messages");

        const msg = document.createElement("div");
        msg.className = "message bot";
        msg.id = "typing-msg";

        const av = document.createElement("div");
        av.className = "msg-avatar";
        av.textContent = "🎧";

        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.innerHTML = "<span></span><span></span><span></span>";

        msg.appendChild(av);
        msg.appendChild(indicator);
        container.appendChild(msg);
        scrollToBottom();
        return msg;
      }

      // ── Remove typing indicator ────────────────────────────────────
      function removeTyping() {
        const el = document.getElementById("typing-msg");
        if (el) el.remove();
      }

      // ── Core: send message to Flask backend ───────────────────────
      async function sendMessage() {
        if (isWaiting) return; // block double-sends

        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        // Clear input and reset height
        input.value = "";
        input.style.height = "auto";

        // Show user's message
        appendMessage("user", text);

        // Lock UI while waiting
        isWaiting = true;
        document.getElementById("sendBtn").disabled = true;

        // Show typing dots
        const typingEl = showTyping();

        try {
          // POST to Flask /chat endpoint
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const data = await res.json();

          removeTyping();

          if (res.ok && data.reply) {
            appendMessage("bot", data.reply);
          } else {
            // Show error returned from backend
            appendMessage(
              "bot",
              data.error || "Something went wrong. Please try again.",
              true,
            );
          }
        } catch (err) {
          // Network error (Flask not running, etc.)
          removeTyping();
          appendMessage(
            "bot",
            "⚠️ Could not reach the server. Make sure Flask is running.",
            true,
          );
        }

        // Unlock UI
        isWaiting = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
      }

      // ── Handle Enter / Shift+Enter ─────────────────────────────────
      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      // ── Suggestion chip clicked ────────────────────────────────────
      function sendSuggestion(btn) {
        document.getElementById("userInput").value = btn.textContent;
        sendMessage();
      }

      // ── Clear chat ─────────────────────────────────────────────────
      function clearChat() {
        const container = document.getElementById("messages");
        container.innerHTML = "";

        // Restore welcome screen
        const welcome = document.createElement("div");
        welcome.className = "welcome";
        welcome.id = "welcome";
        welcome.innerHTML = `
      <span class="welcome-icon">💬</span>
      <h2>How can we help you today?</h2>
      <p>Ask anything about your orders, returns,<br/>shipping, or account — we're here 24/7.</p>
    `;
        container.appendChild(welcome);
        document.getElementById("suggestions").style.display = "flex";
      }
    </script>
  </body>
</html>
